<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body{
            margin: 20px;
        }

        nav {
            width: 100%;
            height: 64px;
            border: 2px Solid black;
        }

        .container {
            display: flex;
            gap: 10px;
        }

        .left {
            width: 20%;
            height: 100vh;
            border: 2px solid black;
        }

        .center {
            margin: 10px;
            width: 60%;
            height: 100vh;
            border: 2px solid black;
        }

        .right {
            margin: 10px;

            width: 20%;
            height: 100vh;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <nav></nav>
    <div class="container">
        <div class="left"></div>
        <div class="center"></div>
        <div class="right"></div>
    </div>
</body>

</html>
